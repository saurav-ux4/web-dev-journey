<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/component.css">
    <title>ApartmentQ | Elite Construction</title>
  </head>
  <body class="container">
    <header>
      <nav>
        <h1 class="logo">APARTmentQ</h1>
        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Portfolio</a></li>
          <li><a href="#">Contacts</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h2>Your Future, Our Mission</h2>
        <p>Exceeding Standards In Elite Construction</p>
        <button>Learn More</button>
      </section>

      <section class="featured">
        <figure>
          <img src="https://images.pexels.com/photos/30893595/pexels-photo-30893595.jpeg" alt="Modern building" />
          <figcaption>
            <span class="tag">News</span>
            <h3>Leaders in elite construction</h3>
            <p>Our modern standards define luxury through innovation, design, comfort, and perfection.</p>
          </figcaption>
        </figure>
      </section>

      <section class="stats">
        <div class="stat">
          <h3>34</h3>
          <p>Total Units</p>
        </div>
        <div class="stat">
          <h3>49K</h3>
          <p>M² to Built</p>
          <span class="badge">Reliable</span>
        </div>
        <div class="stat">
          <h3>256M</h3>
          <p>Portfolio Value ($)</p>
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
